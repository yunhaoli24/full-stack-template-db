name: Backend Lint

on:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-lint.yml
  push:
    branches:
      - master
    paths:
      - backend/**
      - .github/workflows/backend-lint.yml

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
      TEE_API_TOKEN: test-token
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-backend-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-backend-
            uv-${{ runner.os }}-
      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            backend/.mypy_cache
            backend/.ruff_cache
            backend/.pytest_cache
          key: lint-${{ runner.os }}-backend-${{ hashFiles('backend/uv.lock', 'backend/ruff.toml') }}
          restore-keys: |
            lint-${{ runner.os }}-backend-
      - name: Run backend lint checks
        run: bash pre-commit.sh
